<html>
    <head>
        <title>Filter Array</title>
    </head>
    <body>
        <script>
          var numbers=[67, 87, 29, 19, 28, 90, 45, 59, 20, 98, 102, 79, 73, 907];
          var filterednums= numbers.filter(function(item){return item<60});
          document.write (filterednums);
        </script>
    </body>

</html>
