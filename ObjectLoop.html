<html>
    <head>
        <title>JS Practice Object Loop</title>
    </head>
    <body>
        <script>
            var Person= {
                name: "Ashraf Ahmed",
                age: 36,
                NID: 19871594308366752,
                city: "Moulvibazar Sadar",
                height: "5.9 Feet"
            }

            for (var item in Person){
                document.write(Person[item]+"<br/>")
            }
        </script>
    </body>

</html>
